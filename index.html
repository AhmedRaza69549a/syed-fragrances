<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYED FRAGRANCES — Haute Parfumerie</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --black: #0a0a0a;
            --white: #F8F6F2;
            --gold: #C4A35A;
            --mid: #888;
            --border: #E0DDD6;
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'Jost', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--white);
            color: var(--black);
            font-family: var(--sans);
            font-weight: 300;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* ── HEADER (Centered Logo) ── */
        header {
            padding: 15px 5%;
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* Creates 3 columns to perfectly center the middle item */
            align-items: center;
            border-bottom: 0.5px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(248, 246, 242, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .header-left {
            /* Empty space to balance the grid */
        }

        .logo-container {
            display: flex;
            justify-content: center;
            text-decoration: none;
        }

        .logo-container img {
            height: 180px; /* Increased size, no longer restricted by a fixed header height */
            object-fit: contain;
        }

        .header-right {
            display: flex;
            justify-content: flex-end;
        }

        .cart-btn {
            background: transparent;
            border: 0.5px solid var(--black);
            color: var(--black);
            padding: 12px 24px;
            cursor: pointer;
            font-family: var(--sans);
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .cart-btn:hover {
            background: var(--black);
            color: var(--white);
        }

        /* ── HERO SECTION (Video Background) ── */
        .hero {
            height: 85vh; /* slightly taller */
            background-color: var(--black);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
            position: relative;
            overflow: hidden;
        }

        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.5; /* Darkens the video so the white text stays readable */
        }

        .hero-content {
            position: relative;
            z-index: 1; /* Puts the text on top of the video */
        }

        .hero-label {
            font-size: 10px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 24px;
        }

        .hero h1 {
            font-family: var(--serif);
            font-size: clamp(48px, 6vw, 80px);
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -0.01em;
        }

        .hero h1 em {
            font-style: italic;
            color: var(--gold);
        }

        .hero p {
            font-size: 14px;
            color: #ccc;
            max-width: 500px;
            margin: 0 auto;
            line-height: 2;
            letter-spacing: 0.05em;
        }

        /* ── PRODUCT GRID ── */
        .collection-section {
            padding: 100px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title {
            font-family: var(--serif);
            font-size: 42px;
            font-weight: 300;
            letter-spacing: -0.01em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2px;
            background: var(--border);
            border: 0.5px solid var(--border);
        }

        .product-card {
            background: var(--white);
            text-align: center;
            padding: 40px;
            transition: background 0.3s ease;
        }

        .product-card:hover {
            background: #F2EFE8;
        }

        .product-placeholder {
            width: 100%;
            aspect-ratio: 3/4;
            background-color: #0d0d0d;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--mid);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .product-title {
            font-family: var(--serif);
            font-size: 26px;
            font-weight: 400;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 13px;
            color: var(--mid);
            margin-bottom: 24px;
            letter-spacing: 0.1em;
        }

        .add-to-cart {
            width: 100%;
            padding: 16px;
            background: transparent;
            color: var(--black);
            border: 0.5px solid var(--black);
            cursor: pointer;
            font-family: var(--sans);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: all 0.3s ease;
        }

        .add-to-cart:hover {
            background: var(--black);
            color: var(--white);
        }

        /* ── CART MODAL ── */
        #cart-modal {
            display: none;
            position: fixed;
            top: 0; right: 0;
            width: 100%; max-width: 450px;
            height: 100vh;
            background: var(--white);
            border-left: 0.5px solid var(--border);
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
            z-index: 1000;
            flex-direction: column;
        }

        .cart-header {
            padding: 40px;
            border-bottom: 0.5px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-family: var(--serif);
            font-size: 28px;
            font-weight: 300;
        }

        .close-cart {
            cursor: pointer;
            font-size: 32px;
            font-weight: 300;
            background: none; border: none;
            color: var(--mid);
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 0.5px solid var(--border);
        }

        .cart-item-title {
            font-family: var(--serif);
            font-size: 20px;
            margin-bottom: 4px;
        }

        .cart-footer {
            padding: 40px;
            background: #F2EFE8;
            border-top: 0.5px solid var(--border);
        }

        .checkout-form input {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: 0.5px solid var(--border);
            font-family: var(--sans);
            font-size: 12px;
            background: var(--white);
            letter-spacing: 0.05em;
            outline: none;
        }
        
        .checkout-form input:focus {
            border-color: var(--black);
        }

        .whatsapp-checkout {
            width: 100%;
            padding: 18px;
            background: var(--black);
            color: var(--white);
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-family: var(--sans);
            font-size: 11px;
            margin-top: 12px;
            transition: background 0.3s;
        }
        
        .whatsapp-checkout:hover {
            background: #333;
        }

        /* ── FOOTER ── */
        footer {
            background: var(--black);
            color: var(--white);
            text-align: center;
            padding: 60px 5%;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left"></div>
        <a href="#" class="logo-container">
            <img src="logo.png" alt="Syed Fragrances Logo"> 
        </a>
        <div class="header-right">
            <button class="cart-btn" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</button>
        </div>
    </header>
