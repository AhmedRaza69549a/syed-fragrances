<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop — SYED FRAGRANCES</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="logo.png">

    <style>
        :root {
            --black: #0a0a0a;
            --white: #F8F6F2;
            --gold: #C4A35A;
            --mid: #888;
            --border: #E0DDD6;
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'Jost', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--white);
            color: var(--black);
            font-family: var(--sans);
            font-weight: 300;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 15px 5%;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 0.5px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(248, 246, 242, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .hamburger-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 5px;
            width: max-content;
        }

        .hamburger-btn span {
            display: block;
            width: 28px;
            height: 3px;
            background-color: var(--black);
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .hamburger-btn:hover span {
            background-color: var(--gold);
        }

        .hamburger-btn.open span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .hamburger-btn.open span:nth-child(2) { opacity: 0; }
        .hamburger-btn.open span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

        #nav-drawer {
            display: flex; 
            position: fixed;
            top: 0; left: 0;
            width: 100%; max-width: 350px;
            height: 100vh;
            background: var(--white);
            border-right: 0.5px solid var(--border);
            box-shadow: 10px 0 30px rgba(0,0,0,0.05);
            z-index: 2000;
            flex-direction: column;
            transform: translateX(-100%); 
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
        }

        #nav-drawer.active { transform: translateX(0); }

        .nav-drawer-links {
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .nav-link {
            color: var(--black);
            text-decoration: none;
            font-family: var(--serif);
            font-size: 28px;
            font-weight: 300;
            transition: color 0.3s;
        }

        .nav-link:hover { color: var(--gold); }

        .logo-container {
            display: flex;
            justify-content: center;
            text-decoration: none;
        }

        .logo-container img {
            height: 180px; 
            object-fit: contain;
        }

        .header-right {
            display: flex;
            justify-content: flex-end;
        }

        .cart-btn {
            background: transparent;
            border: 0.5px solid var(--black);
            color: var(--black);
            padding: 12px 24px;
            cursor: pointer;
            font-family: var(--sans);
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .cart-btn:hover {
            background: var(--black);
            color: var(--white);
        }

        .collection-section {
            padding: 100px 5%;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 80vh; 
        }

        .section-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .section-title {
            font-family: var(--serif);
            font-size: 42px;
            font-weight: 300;
            letter-spacing: -0.01em;
        }

        /* ── SEARCH BAR CSS (LEFT ALIGNED) ── */
        .search-container {
            max-width: 320px;
            margin: 0 0 40px 0;
            display: block;
        }

        #search-input {
            width: 100%;
            padding: 14px 18px;
            font-family: var(--sans);
            font-size: 13px;
            border: 0.5px solid var(--border);
            background-color: var(--white);
            color: var(--black);
            letter-spacing: 0.05em;
            outline: none;
            transition: border-color 0.3s;
        }

        #search-input:focus {
            border-color: var(--black);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2px;
            background: var(--border);
            border: 0.5px solid var(--border);
            padding: 20px 0;
        }

        .product-card {
            background: var(--white);
            text-align: center;
            padding: 40px;
            position: relative;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .product-card:hover {
            background: #ffffff;
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06);
            z-index: 2;
        }

        .product-placeholder {
            width: 100%;
            aspect-ratio: 3/4;
            background-color: #0d0d0d;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--mid);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer; 
            overflow: hidden;
        }

        .product-placeholder img {
            transition: transform 1.2s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .product-placeholder:hover img {
            transform: scale(1.1);
        }

        .product-size {
            font-size: 10px;
            color: var(--gold);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .product-title {
            font-family: var(--serif);
            font-size: 22px;
            font-weight: 400;
            margin-bottom: 8px;
            line-height: 1.3;
            cursor: pointer;
        }

        .product-price {
            font-size: 13px;
            color: var(--mid);
            margin-bottom: 24px;
            letter-spacing: 0.1em;
        }

        .add-to-cart {
            width: 100%;
            padding: 16px;
            background: transparent;
            color: var(--black);
            border: 0.5px solid var(--black);
            cursor: pointer;
            font-family: var(--sans);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: all 0.4s ease;
            margin-top: auto;
        }

        .add-to-cart:hover {
            background: var(--black);
            color: var(--white);
        }

        /* ── CART MODAL ── */
        #cart-modal {
            display: flex; 
            position: fixed;
            top: 0; right: 0;
            width: 100%; max-width: 450px;
            height: 100vh;
            background: var(--white);
            border-left: 0.5px solid var(--border);
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
            z-index: 1000;
            flex-direction: column;
            transform: translateX(100%); 
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
        }

        #cart-modal.active { transform: translateX(0); }

        .cart-header {
            padding: 40px;
            border-bottom: 0.5px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-family: var(--serif);
            font-size: 28px;
            font-weight: 300;
        }

        .close-btn {
            cursor: pointer;
            font-size: 32px;
            font-weight: 300;
            background: none; border: none;
            color: var(--mid);
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 0.5px solid var(--border);
        }

        .cart-item-title {
            font-family: var(--serif);
            font-size: 18px;
            margin-bottom: 4px;
        }

        .cart-qty-btn {
            background: transparent;
            border: none;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 14px;
            color: var(--black);
            transition: background 0.2s;
        }

        .cart-qty-btn:hover { background: #eaeaea; }

        .cart-footer {
            padding: 40px;
            background: #F2EFE8;
            border-top: 0.5px solid var(--border);
        }

        .checkout-form input[type="text"],
        .checkout-form input[type="tel"] {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: 0.5px solid var(--border);
            font-family: var(--sans);
            font-size: 12px;
            background: var(--white);
            letter-spacing: 0.05em;
            outline: none;
        }
        
        .checkout-form input:focus { border-color: var(--black); }

        .checkbox-container {
            display: flex;
            align-items: center;
            font-family: var(--sans);
            font-size: 13px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .checkbox-container input {
            margin-right: 10px;
            width: auto;
            cursor: pointer;
        }

        .whatsapp-checkout {
            width: 100%;
            padding: 18px;
            background: var(--black);
            color: var(--white);
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-family: var(--sans);
            font-size: 11px;
            margin-top: 12px;
            transition: background 0.3s;
        }
        
        .whatsapp-checkout:hover { background: #333; }

        #product-view-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(5px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .pv-content {
            background: var(--white);
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-wrap: wrap;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .pv-close {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 32px;
            background: none; border: none;
            color: var(--black);
            cursor: pointer;
            z-index: 10;
        }

        .pv-image-container {
            flex: 1 1 300px;
            background: #0d0d0d;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--mid);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            overflow: hidden;
        }

        .pv-details {
            flex: 1 1 300px;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .pv-details h2 {
            font-family: var(--serif);
            font-size: 36px;
            font-weight: 300;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .pv-desc {
            font-size: 14px;
            color: var(--mid);
            margin-bottom: 30px;
        }

        #confirmation-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(5px);
            z-index: 4000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .confirm-content {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
        }

        footer {
            background: var(--black);
            color: var(--white);
            text-align: center;
            padding: 60px 5%;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        
        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .social-link {
            color: var(--white);
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 0.2em;
            transition: color 0.3s;
        }

        .social-link:hover { color: var(--gold); }

        @media (max-width: 768px) {
            .logo-container img { height: 120px; }
        }
    </style>
</head>
<body>

        <div class="pv-content" onclick="event.stopPropagation()">
            <button class="pv-close" onclick="closeProductView()">×</button>
            <div class="pv-image-container" id="pv-image"></div>
            <div class="pv-details">
                <p class="product-size" id="pv-size">50 ML</p>
                <h2 id="pv-title">Product Name</h2>
                <p class="product-price" id="pv-price" style="font-size: 16px; margin-bottom: 16px;">Rs. 0</p>
                <p class="pv-desc" id="pv-desc-text"></p>
                <div id="pv-button-container"></div>
            </div>
        </div>
    </div>

    <div id="confirmation-modal">
        <div class="confirm-content">
            <h2 style="font-family: var(--serif); font-size: 32px; font-weight: 300; margin-bottom: 16px;">Thank You</h2>
            <div style="height: 0.5px; background: var(--gold); width: 40px; margin: 0 auto 24px auto;"></div>
            <p style="font-size: 14px; color: var(--mid); margin-bottom: 40px; line-height: 1.8;">Your order has been successfully received. Our team will contact you shortly to confirm your delivery details.</p>
            <button class="add-to-cart" style="background: var(--black); color: var(--white);" onclick="closeConfirmation()">Continue Shopping</button>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = ""; 
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyCdf2bQI0PbY9k7UHqgOWAdQbXugOUAXKugXPT8eZja9hvbAK1l35y3w3b4DyYt44/exec"; 

        const products = [
            { id: 1, name: "Impression of Sensation", price: 2500, size: "50 ml", image: "sensation.png", description: "A quiet embrace of warm amber and milky woods that melts into the skin. It is the scent of unspoken confidence, resting softly yet leaving a profound memory." },

            { id: 9, name: "Impression of Azzaro Chrome", price: 2500, size: "50 ml", image: "azzaro chrome.png", description: "A sharp, metallic burst of citrus that cuts through the heat with absolute precision. It shines with a crisp, clear freshness that feels endlessly pure." },

            { id: 19, name: "Impression of One Million", price: 2500, size: "50 ml", image: "One Million.png", description: "A lavish pour of blood mandarin, warm cinnamon, and rich leather that defies subtlety. It is an intoxicating rush of pure, unapologetic extravagance." },

            { id: 23, name: "Impression of Office For Men", price: 2500, size: "50 ml", image: "Office For Men.png", description: "A razor-sharp opening of bergamot and ambroxan that commands immediate respect. It is a brilliantly clean, authoritative signature designed for absolute professional dominance." }

        let cart = JSON.parse(localStorage.getItem('syedCart')) || [];

        function filterProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filteredArray = products.filter(product => {
                return product.name.toLowerCase().includes(query) || 
                       product.description.toLowerCase().includes(query);
            });
            renderProducts(filteredArray);
        }

        function renderProducts(productsToRender = products) {
            const grid = document.getElementById('product-grid');
            if(!grid) return; 
            
            if (productsToRender.length === 0) {
                grid.innerHTML = '<p style="text-align:center; color: #888; grid-column: 1 / -1; padding: 40px;">No fragrances match your search.</p>';
                return;
            }

            grid.innerHTML = productsToRender.map(product => {
                let imageHtml = product.image 
                    ? `<img src="${product.image}" alt="${product.name}" style="width: 100%; height: 100%; object-fit: cover;">`
                    : `Image Space`;

                return `
                <div class="product-card">
                    <div class="product-placeholder" onclick="openProductView(${product.id})" ${product.image ? 'style="padding: 0; background: transparent;"' : ''}>
                        ${imageHtml}
                    </div>
                    <p class="product-size">${product.size}</p>
                    <h3 class="product-title" onclick="openProductView(${product.id})">${product.name}</h3>
                    <p class="product-price">Rs. ${product.price.toLocaleString()}</p>
                    <button class="add-to-cart" onclick="addToCart(${product.id})">Add to Cart</button>
                </div>
                `;
            }).join('');
        }

        function openProductView(productId) {
            const product = products.find(p => p.id === productId);
            if(!product) return;
            
            let imageHtml = product.image 
                ? `<img src="${product.image}" style="width: 100%; height: 100%; object-fit: cover;">`
                : `Image Space`;
            
            document.getElementById('pv-image').innerHTML = imageHtml;
            document.getElementById('pv-image').style.background = product.image ? 'transparent' : '#0d0d0d';
            
            document.getElementById('pv-title').innerText = product.name;
            document.getElementById('pv-price').innerText = `Rs. ${product.price.toLocaleString()}`;
            document.getElementById('pv-size').innerText = product.size;
            
            const defaultDesc = "A masterpiece of olfactory design. High concentration formula crafted with premium ingredients for long-lasting sillage.";
            document.getElementById('pv-desc-text').innerText = product.description ? product.description : defaultDesc;
            
            document.getElementById('pv-button-container').innerHTML = `
                <button class="add-to-cart" style="background: var(--black); color: var(--white);" onclick="addToCartAndClose(${product.id})">Add to Cart - Rs. ${product.price.toLocaleString()}</button>
            `;

            document.getElementById('product-view-modal').style.display = 'flex';
        }

        function closeProductView() {
            document.getElementById('product-view-modal').style.display = 'none';
        }

        function addToCartAndClose(productId) {
            addToCart(productId);
            closeProductView();
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
            
            const modal = document.getElementById('cart-modal');
            if(!modal.classList.contains('active')) {
                toggleCart();
            }
        }

        function updateQuantity(productId, change) {
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== productId);
                }
                updateCartUI();
            }
        }

        function removeFromCart(productId) {
            cart = cart.filter(i => i.id !== productId);
            updateCartUI();
        }

        function updateCartUI() {
            localStorage.setItem('syedCart', JSON.stringify(cart));
            
            const container = document.getElementById('cart-items-container');
            const countSpan = document.getElementById('cart-count');
            const totalSpan = document.getElementById('cart-total');

            countSpan.innerText = cart.reduce((sum, item) => sum + item.quantity, 0);
            
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `
                    <div class="cart-item">
                        <div>
                            <div class="cart-item-title">${item.name}</div>
                            <div style="font-size: 11px; color: #888; letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 10px; margin-top: 8px;">
                                <span>${item.size}</span>
                                <div style="display: flex; align-items: center; border: 0.5px solid var(--border); border-radius: 3px; overflow: hidden;">
                                    <button onclick="updateQuantity(${item.id}, -1)" class="cart-qty-btn">−</button>
                                    <span style="font-size: 12px; font-weight: 500; color: var(--black); min-width: 16px; text-align: center;">${item.quantity}</span>
                                    <button onclick="updateQuantity(${item.id}, 1)" class="cart-qty-btn">+</button>
                                </div>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <p style="font-size: 14px; margin-bottom: 8px;">Rs. ${(item.price * item.quantity).toLocaleString()}</p>
                            <button onclick="removeFromCart(${item.id})" style="background: none; border: none; color: #999; font-size: 9px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; text-decoration: underline;">Remove</button>
                        </div>
                    </div>
                `;
            }).join('');

            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; color: #888; margin-top: 40px; font-size: 14px;">Your cart is empty.</p>';
            }

            totalSpan.innerText = `Rs. ${total.toLocaleString()}`;
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.classList.toggle('active');
        }

        function toggleNav() {
            const nav = document.getElementById('nav-drawer');
            const btn = document.querySelector('.hamburger-btn');
            nav.classList.toggle('active');
            btn.classList.toggle('open');
        }

        function closeConfirmation() {
            document.getElementById('confirmation-modal').style.display = 'none';
        }

        function checkoutViaWhatsApp() {
            if (cart.length === 0) {
                alert("Your cart is empty.");
                return;
            }

            const name = document.getElementById('cust-name').value.trim();
            const phone = document.getElementById('cust-phone').value.trim();
            const address = document.getElementById('cust-address').value.trim();
            const isGiftWrap = document.getElementById('gift-wrap').checked;

            if (!name || !phone || !address) {
                alert("Please fill in your name, contact number, and delivery address.");
                return;
            }

            const checkoutBtn = document.getElementById('checkout-btn');
            const originalBtnText = checkoutBtn.innerText;
            checkoutBtn.innerText = "Processing...";
            checkoutBtn.disabled = true;

            let orderString = "";
            let total = 0;
            cart.forEach(item => {
                orderString += `- ${item.quantity}x ${item.name} (${item.size}) - Rs. ${item.price * item.quantity}\n`;
                total += item.price * item.quantity;
            });

            const orderData = {
                name: name,
                phone: phone,
                address: address,
                orderDetails: orderString,
                total: total,
                giftWrap: isGiftWrap ? "Yes" : "No"
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(orderData)
            }).then(() => {
                checkoutBtn.innerText = originalBtnText;
                checkoutBtn.disabled = false;

                if (WHATSAPP_NUMBER === "") {
                    cart = []; 
                    updateCartUI(); 
                    
                    document.getElementById('cust-name').value = '';
                    document.getElementById('cust-phone').value = '';
                    document.getElementById('cust-address').value = '';
                    document.getElementById('gift-wrap').checked = false;

                    toggleCart(); 
                    document.getElementById('confirmation-modal').style.display = 'flex';
                } else {
                    let message = `*New Order - Syed Fragrances*\n\n`;
                    message += `*Customer:* ${name}\n`;
                    message += `*Phone:* ${phone}\n`;
                    message += `*Address:* ${address}\n\n`;
                    message += `*Order Details:*\n`;
                    message += orderString;
                    if (isGiftWrap) {
                        message += `\n*Extras:* Premium Gift Wrap Requested 🎁\n`;
                    }
                    message += `\n*Total Due: Rs. ${total.toLocaleString()}*\n\n`;
                    message += `Please confirm delivery details and payment method.`;

                    const encodedMessage = encodeURIComponent(message);
                    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`, '_blank');
                }
            }).catch(error => {
                checkoutBtn.innerText = originalBtnText;
                checkoutBtn.disabled = false;
                alert("There was an issue processing the order. Please try again.");
            });
        }

        document.addEventListener('click', function(event) {
            const nav = document.getElementById('nav-drawer');
            const hamburgerBtn = document.querySelector('.hamburger-btn');
            const cartModal = document.getElementById('cart-modal');
            const cartBtn = document.querySelector('.cart-btn');

            if (nav && nav.classList.contains('active') && !nav.contains(event.target) && hamburgerBtn && !hamburgerBtn.contains(event.target)) {
                toggleNav();
            }

            if (cartModal && cartModal.classList.contains('active') && !cartModal.contains(event.target) && cartBtn && !cartBtn.contains(event.target) && !event.target.classList.contains('add-to-cart')) {
                toggleCart();
            }
        });

        renderProducts();
        updateCartUI(); 
    </script>
</body>
</html>
