<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYED FRAGRANCES — Haute Parfumerie</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --black: #0a0a0a;
            --white: #F8F6F2;
            --gold: #C4A35A;
            --mid: #888;
            --border: #E0DDD6;
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'Jost', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--white);
            color: var(--black);
            font-family: var(--sans);
            font-weight: 300;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 15px 5%;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 0.5px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(248, 246, 242, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            text-decoration: none;
        }

        .logo-container img {
            height: 180px; 
            object-fit: contain;
        }

        .header-right {
            display: flex;
            justify-content: flex-end;
        }

        .cart-btn {
            background: transparent;
            border: 0.5px solid var(--black);
            color: var(--black);
            padding: 12px 24px;
            cursor: pointer;
            font-family: var(--sans);
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .cart-btn:hover {
            background: var(--black);
            color: var(--white);
        }

        .hero {
            height: 85vh;
            background-color: var(--black);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
            position: relative;
            overflow: hidden;
        }

        .hero-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.4;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            color: #ffffff;
        }

        .hero-label {
            font-size: 10px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 24px;
        }

        .hero h1 {
            font-family: var(--serif);
            font-size: clamp(48px, 6vw, 80px);
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -0.01em;
            color: #ffffff;
        }

        .hero h1 em {
            font-style: italic;
            color: var(--gold);
        }

        .hero p {
            font-size: 14px;
            color: #dddddd;
            max-width: 500px;
            margin: 0 auto;
            line-height: 2;
            letter-spacing: 0.05em;
        }

        .collection-section {
            padding: 100px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title {
            font-family: var(--serif);
            font-size: 42px;
            font-weight: 300;
            letter-spacing: -0.01em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2px;
            background: var(--border);
            border: 0.5px solid var(--border);
        }

        .product-card {
            background: var(--white);
            text-align: center;
            padding: 40px;
            transition: background 0.3s ease;
        }

        .product-card:hover {
            background: #F2EFE8;
        }

        .product-placeholder {
            width: 100%;
            aspect-ratio: 3/4;
            background-color: #0d0d0d;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--mid);
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .product-size {
            font-size: 10px;
            color: var(--gold);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .product-title {
            font-family: var(--serif);
            font-size: 22px;
            font-weight: 400;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .product-price {
            font-size: 13px;
            color: var(--mid);
            margin-bottom: 24px;
            letter-spacing: 0.1em;
        }

        .add-to-cart {
            width: 100%;
            padding: 16px;
            background: transparent;
            color: var(--black);
            border: 0.5px solid var(--black);
            cursor: pointer;
            font-family: var(--sans);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: all 0.3s ease;
        }

        .add-to-cart:hover {
            background: var(--black);
            color: var(--white);
        }

        #cart-modal {
            display: none;
            position: fixed;
            top: 0; right: 0;
            width: 100%; max-width: 450px;
            height: 100vh;
            background: var(--white);
            border-left: 0.5px solid var(--border);
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
            z-index: 1000;
            flex-direction: column;
        }

        .cart-header {
            padding: 40px;
            border-bottom: 0.5px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-family: var(--serif);
            font-size: 28px;
            font-weight: 300;
        }

        .close-cart {
            cursor: pointer;
            font-size: 32px;
            font-weight: 300;
            background: none; border: none;
            color: var(--mid);
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 0.5px solid var(--border);
        }

        .cart-item-title {
            font-family: var(--serif);
            font-size: 18px;
            margin-bottom: 4px;
        }

        .cart-footer {
            padding: 40px;
            background: #F2EFE8;
            border-top: 0.5px solid var(--border);
        }

        .checkout-form input {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: 0.5px solid var(--border);
            font-family: var(--sans);
            font-size: 12px;
            background: var(--white);
            letter-spacing: 0.05em;
            outline: none;
        }
        
        .checkout-form input:focus {
            border-color: var(--black);
        }

        .whatsapp-checkout {
            width: 100%;
            padding: 18px;
            background: var(--black);
            color: var(--white);
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-family: var(--sans);
            font-size: 11px;
            margin-top: 12px;
            transition: background 0.3s;
        }
        
        .whatsapp-checkout:hover {
            background: #333;
        }

        footer {
            background: var(--black);
            color: var(--white);
            text-align: center;
            padding: 60px 5%;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left"></div>
        <a href="#" class="logo-container">
            <img src="logo.png" alt="Syed Fragrances Logo"> 
        </a>
        <div class="header-right">
            <button class="cart-btn" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</button>
        </div>
    </header>

    <section class="hero">
        <video class="hero-video" autoplay loop muted playsinline>
            <source src="hero.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <p class="hero-label">Est. 2024</p>
            <h1>The art of<br><em>invisible</em> presence</h1>
            <p>Crafted with uncompromising standards and the rarest raw materials. A private conversation between you and the world.</p>
        </div>
    </section>

    <main class="collection-section">
        <div class="section-header">
            <h2 class="section-title">The Collection</h2>
            <div style="height: 0.5px; background: var(--gold); width: 40px; margin: 24px auto;"></div>
        </div>
        <div class="grid" id="product-grid">
            </div>
    </main>

    <footer>
        <p>&copy; 2026 Syed Fragrances. Worldwide.</p>
    </footer>

    <div id="cart-modal">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items" id="cart-items-container"></div>
        <div class="cart-footer">
            <h3 style="margin-bottom: 24px; display: flex; justify-content: space-between; font-family: var(--serif); font-size: 24px; font-weight: 400;">
                <span>Total</span>
                <span id="cart-total">Rs. 0</span>
            </h3>
            
            <div class="checkout-form">
                <input type="text" id="cust-name" placeholder="Full Name" required>
                <input type="text" id="cust-address" placeholder="Delivery Address" required>
            </div>

            <button class="whatsapp-checkout" onclick="checkoutViaWhatsApp()">Place Order</button>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = ""; 
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxy5H5Pf2KsDuNq2kf6YfcO_WEiICg-4wYvNAQJPpY5kp-KtfPV6wDIr4vseAj-CBvG/exec"; 

        const products = [
            { id: 1, name: "Impression of Sensation", price: 2500, size: "50 ml" image: "sensation.png" },
            { id: 2, name: "Impression of Gucci Bloom", price: 2500, size: "50 ml" image: "gucci bloom.png" }, },
            { id: 3, name: "Impression of Erba Pura", price: 2500, size: "50 ml" image: "erba pura.png" },
            { id: 4, name: "Impression of Sabaya", price: 2500, size: "50 ml" },
            { id: 5, name: "Impression of SRK", price: 2500, size: "50 ml" },
            { id: 6, name: "Impression of Azzaro Wanted", price: 2500, size: "50 ml" },
            { id: 7, name: "Impression of Cool Water", price: 2500, size: "50 ml" },
            { id: 8, name: "Impression of Isse Miyake", price: 2500, size: "50 ml" },
            { id: 9, name: "Impression of Azzaro Chrome", price: 2500, size: "50 ml" },
            { id: 10, name: "Impression of Black Orchid Tomford", price: 2500, size: "50 ml" },
            { id: 11, name: "Impression of Bombshell", price: 2500, size: "50 ml" },
            { id: 12, name: "Impression of Hugo boss", price: 2500, size: "50 ml" },
            { id: 13, name: "Impression of Creed Aventus", price: 2500, size: "50 ml" },
            { id: 14, name: "Impression of Zarar", price: 2500, size: "50 ml", image: "zarar.jpg" },
            { id: 15, name: "Impression of David Beckham", price: 2500, size: "50 ml" },
            { id: 16, name: "Impression of Uroosa", price: 2500, size: "50 ml" },
            { id: 17, name: "Impression of 502", price: 2500, size: "50 ml" },
            { id: 18, name: "Impression of Chanel", price: 2500, size: "50 ml" },
            { id: 19, name: "Impression of One Million", price: 2500, size: "50 ml" },
            { id: 20, name: "Impression of Versace Bright Crystal", price: 2500, size: "50 ml" },
            { id: 21, name: "Impression of Gucci Flora", price: 2500, size: "50 ml" },
            { id: 22, name: "Impression of Janan Sports", price: 2500, size: "50 ml" }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(product => {
                let imageHtml = product.image 
                    ? `<img src="${product.image}" alt="${product.name}" style="width: 100%; height: 100%; object-fit: cover;">`
                    : `Image Space`;

                return `
                <div class="product-card">
                    <div class="product-placeholder" ${product.image ? 'style="padding: 0; background: transparent;"' : ''}>
                        ${imageHtml}
                    </div>
                    <p class="product-size">${product.size}</p>
                    <h3 class="product-title">${product.name}</h3>
                    <p class="product-price">Rs. ${product.price.toLocaleString()}</p>
                    <button class="add-to-cart" onclick="addToCart(${product.id})">Add to Cart</button>
                </div>
                `;
            }).join('');
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
            
            const modal = document.getElementById('cart-modal');
            if(modal.style.display !== 'flex') {
                toggleCart();
            }
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const countSpan = document.getElementById('cart-count');
            const totalSpan = document.getElementById('cart-total');

            countSpan.innerText = cart.reduce((sum, item) => sum + item.quantity, 0);
            
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `
                    <div class="cart-item">
                        <div>
                            <div class="cart-item-title">${item.name}</div>
                            <p style="font-size: 11px; color: #888; letter-spacing: 0.1em; text-transform: uppercase;">${item.size} | Qty: ${item.quantity}</p>
                        </div>
                        <p style="font-size: 14px;">Rs. ${(item.price * item.quantity).toLocaleString()}</p>
                    </div>
                `;
            }).join('');

            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; color: #888; margin-top: 40px; font-size: 14px;">Your cart is empty.</p>';
            }

            totalSpan.innerText = `Rs. ${total.toLocaleString()}`;
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        function checkoutViaWhatsApp() {
            if (cart.length === 0) {
                alert("Your cart is empty.");
                return;
            }

            const name = document.getElementById('cust-name').value.trim();
            const address = document.getElementById('cust-address').value.trim();

            if (!name || !address) {
                alert("Please enter your name and delivery address.");
                return;
            }

            let orderString = "";
            let total = 0;
            cart.forEach(item => {
                orderString += `- ${item.quantity}x ${item.name} (${item.size}) - Rs. ${item.price * item.quantity}\n`;
                total += item.price * item.quantity;
            });

            const orderData = {
                name: name,
                address: address,
                orderDetails: orderString,
                total: total
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(orderData)
            }).then(() => {
                if (WHATSAPP_NUMBER === "") {
                    alert("Order successfully logged! We will contact you shortly to confirm.");
                    cart = []; 
                    updateCartUI();
                    toggleCart();
                } else {
                    let message = `*New Order - Syed Fragrances*\n\n`;
                    message += `*Customer:* ${name}\n`;
                    message += `*Address:* ${address}\n\n`;
                    message += `*Order Details:*\n`;
                    message += orderString;
                    message += `\n*Total Due: Rs. ${total.toLocaleString()}*\n\n`;
                    message += `Please confirm delivery details and payment method.`;

                    const encodedMessage = encodeURIComponent(message);
                    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`, '_blank');
                }
            }).catch(error => {
                alert("There was an issue processing the order. Please try again.");
            });
        }

        renderProducts();
    </script>
</body>
</html>
