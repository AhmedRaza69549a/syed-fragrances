<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syed Fragrances</title>
    <style>
        /* Minimalist Black & White Theme */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #e0e0e0;
            --hover-color: #f5f5f5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* Header & Navigation */
        header {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            z-index: 100;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-color);
        }

        .logo-container img {
    height: 120px; 
    margin-bottom: 0.5rem;
}
        .cart-btn {
            background: none;
            border: 1px solid var(--text-color);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .cart-btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        /* Product Grid */
        .container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 5%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 3rem;
        }

        .product-card {
            text-align: center;
        }

        .product-image {
            width: 100%;
            aspect-ratio: 3/4;
            background-color: var(--hover-color);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        .product-title {
            font-size: 1.2rem;
            font-weight: normal;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-size: 1rem;
            color: #666;
            margin-bottom: 1rem;
        }

        .add-to-cart {
            width: 100%;
            padding: 1rem;
            background: var(--text-color);
            color: var(--bg-color);
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.3s ease;
        }

        .add-to-cart:hover {
            opacity: 0.8;
        }

        /* Cart Modal */
        #cart-modal {
            display: none;
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: var(--bg-color);
            border-left: 1px solid var(--border-color);
            box-shadow: -5px 0 15px rgba(0,0,0,0.05);
            z-index: 1000;
            flex-direction: column;
        }

        .cart-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-cart {
            cursor: pointer;
            font-size: 1.5rem;
            background: none;
            border: none;
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--hover-color);
        }

        .cart-footer {
            padding: 2rem;
            border-top: 1px solid var(--border-color);
        }

        .checkout-form input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
            font-family: inherit;
        }

        .whatsapp-checkout {
            width: 100%;
            padding: 1rem;
            background: #25D366; /* Standard WhatsApp Green, can change to black if preferred */
            color: white;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo-container">
            <img src="logo.png" alt="Syed Fragrances Logo"> 
        </a>
        <button class="cart-btn" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</button>
    </header>

    <main class="container">
        <div class="grid" id="product-grid">
            </div>
    </main>

    <div id="cart-modal">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items" id="cart-items-container">
            </div>
        <div class="cart-footer">
            <h3 style="margin-bottom: 1rem; display: flex; justify-content: space-between;">
                <span>Total:</span>
                <span id="cart-total">Rs. 0</span>
            </h3>
            
            <div class="checkout-form">
                <input type="text" id="cust-name" placeholder="Full Name" required>
                <input type="text" id="cust-address" placeholder="Delivery Address" required>
            </div>

            <button class="whatsapp-checkout" onclick="checkoutViaWhatsApp()">Order via WhatsApp</button>
        </div>
    </div>

    <script>
        // Placeholder for the new WhatsApp number. Use country code without the '+'
        // Example for Pakistan: "923001234567"
        const WHATSAPP_NUMBER = "ENTER_NEW_NUMBER_HERE"; 

        // Product Catalog (You can expand this)
        const products = [
            { id: 1, name: "Oud Noir", price: 4500 },
            { id: 2, name: "Velvet Rose", price: 3800 },
            { id: 3, name: "Sandalwood Reserve", price: 5200 },
            { id: 4, name: "Amber Blanc", price: 4100 }
        ];

        let cart = [];

        // Render Products to the page
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        <img src="logo.png" alt="Bottle" style="opacity: 0.1; width: 50%;">
                    </div>
                    <h3 class="product-title">${product.name}</h3>
                    <p class="product-price">Rs. ${product.price.toLocaleString()}</p>
                    <button class="add-to-cart" onclick="addToCart(${product.id})">Add to Cart</button>
                </div>
            `).join('');
        }

        // Cart Functions
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const countSpan = document.getElementById('cart-count');
            const totalSpan = document.getElementById('cart-total');

            countSpan.innerText = cart.reduce((sum, item) => sum + item.quantity, 0);
            
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `
                    <div class="cart-item">
                        <div>
                            <h4>${item.name}</h4>
                            <p style="font-size: 0.9rem; color: #666;">Qty: ${item.quantity}</p>
                        </div>
                        <p>Rs. ${(item.price * item.quantity).toLocaleString()}</p>
                    </div>
                `;
            }).join('');

            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center; color: #666;">Your cart is empty.</p>';
            }

            totalSpan.innerText = `Rs. ${total.toLocaleString()}`;
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        // WhatsApp API Integration
        function checkoutViaWhatsApp() {
            if (cart.length === 0) {
                alert("Your cart is empty.");
                return;
            }

            const name = document.getElementById('cust-name').value.trim();
            const address = document.getElementById('cust-address').value.trim();

            if (!name || !address) {
                alert("Please enter your name and delivery address.");
                return;
            }

            // Build the message
            let message = `*New Order - Syed Fragrances*\n\n`;
            message += `*Customer:* ${name}\n`;
            message += `*Address:* ${address}\n\n`;
            message += `*Order Details:*\n`;
            
            let total = 0;
            cart.forEach(item => {
                message += `- ${item.quantity}x ${item.name} (Rs. ${item.price * item.quantity})\n`;
                total += item.price * item.quantity;
            });

            message += `\n*Total Due: Rs. ${total.toLocaleString()}*\n\n`;
            message += `Please confirm delivery details and payment method.`;

            // Encode the string for a URL
            const encodedMessage = encodeURIComponent(message);
            
            // Redirect to WhatsApp
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`, '_blank');
        }

        // Initialize page
        renderProducts();
    </script>
</body>
</html>
